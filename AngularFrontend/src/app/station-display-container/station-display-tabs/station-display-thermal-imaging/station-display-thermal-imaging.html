<div style="display: flex">
    <p-button label="Refresh" (click)="get_thermal_image()"></p-button>
</div>
<svg #svgGrid (pointermove)="drag($event)" class="overlay" viewBox="0 0 32 24" preserveAspectRatio="none" class="thermal-grid">
      @for (px of pixels(); track $index) {
        <rect
          [attr.x]="px.x"
          [attr.y]="px.y"
          width="1"
          height="1"
          [attr.fill]="convert_temperature_to_color(px.temperature)"
          class="cell"
          (click)="selectPixel(px)"
        />
        <rect
          [attr.x]="px.x"
          [attr.y]="px.y"
          width="1"
          height="1"
          [attr.fill]="get_overlay_color(px)"
          class="cell"
          (click)="selectPixel(px)"
        />
      }
    </svg>

<div style="display: flex">
  <p-selectbutton [options]="paintOptions" [(ngModel)]="water_ground_selected" optionValue="value" aria-labelledby="basic"></p-selectbutton>
</div>
<div style="display:flex">
  <p-button label="Save" (click)="save_bitmap()"></p-button>
</div>
